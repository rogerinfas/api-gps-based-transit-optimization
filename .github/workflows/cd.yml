name: Backend CD

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_PATH: ${{ secrets.BACKEND_APP_PATH }}
          REPO_URL: https://github.com/rogerinfas/api-gps-based-transit-optimization.git
          BRANCH_NAME: ${{ github.ref_name }}
          PORT: "4000"
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: APP_PATH,REPO_URL,BRANCH_NAME,PORT,POSTGRES_PORT,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD
          script: |
            set -e

            if [ ! -d "$APP_PATH/.git" ]; then
              git clone "$REPO_URL" "$APP_PATH"
            fi

            cd "$APP_PATH"
            git fetch --all --prune
            git checkout "$BRANCH_NAME"
            git reset --hard "origin/$BRANCH_NAME"

            cat > .env <<EOF
            PORT=${PORT}
            DB_HOST=postgres
            DB_PORT=5432
            DB_NAME=${POSTGRES_DB}
            DB_USER=${POSTGRES_USER}
            DB_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_PORT=${POSTGRES_PORT}
            POSTGRES_DB=${POSTGRES_DB}
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
            EOF

            docker compose -f docker-compose.prod.yml up -d postgres
            docker compose -f docker-compose.prod.yml run --rm api pnpm prisma migrate deploy
            docker compose -f docker-compose.prod.yml up -d --build api
